<body>
    <canvas id="particle-canvas"></canvas>
    
    <div class="page-header">
        <h1>
            <i class="fas fa-tachometer-alt"></i> Gestionar Panel
        </h1>
        <div class="header-description">
            Controla y monitorea el panel de seguridad en tiempo real
        </div>
    </div>

    <div class="edit-main-container">
        <div class="edit-wrapper" style="max-width: 1200px;">
            <div class="edit-right-panel">
                <header class="edit-header">
                    <h1 class="edit-main-title">PANEL: <span id="panelAlias">-</span></h1>
                    <p class="edit-sub-title">
                        Serial: <span id="panelSerial">-</span> | Modelo: <span id="panelModelo">-</span>
                    </p>
                </header>

                <!-- Estado del panel -->
                <div class="status-card" id="statusCard">
                    <div class="status-header">
                        <i class="fas fa-circle" id="statusIcon"></i>
                        <span id="statusTexto">Verificando...</span>
                    </div>
                    <div class="status-info">
                        <div class="info-item">
                            <span class="info-label">Última conexión:</span>
                            <span class="info-value" id="ultimaConexion">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Batería:</span>
                            <span class="info-value" id="bateria">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Señal:</span>
                            <span class="info-value" id="senal">-</span>
                        </div>
                    </div>
                </div>

                <!-- Controles de armado -->
                <div class="controls-section">
                    <h3><i class="fas fa-shield-alt"></i> Control de Armado</h3>
                    <div class="state-buttons">
                        <button class="state-btn disarm" id="btnDisarm" data-state="DISARM">
                            <i class="fas fa-unlock"></i> Desarmado
                        </button>
                        <button class="state-btn home" id="btnHome" data-state="HOME">
                            <i class="fas fa-home"></i> Modo Casa
                        </button>
                        <button class="state-btn away" id="btnAway" data-state="AWAY">
                            <i class="fas fa-building"></i> Modo Ausente
                        </button>
                    </div>
                </div>

                <!-- Tabs para diferentes secciones -->
                <div class="tabs-container">
                    <div class="tabs-header">
                        <button class="tab-btn active" data-tab="zonas">
                            <i class="fas fa-map-marker-alt"></i> Zonas
                        </button>
                        <button class="tab-btn" data-tab="eventos">
                            <i class="fas fa-history"></i> Eventos
                        </button>
                        <button class="tab-btn" data-tab="dispositivos">
                            <i class="fas fa-microchip"></i> Dispositivos
                        </button>
                    </div>
                    
                    <!-- Tab Zonas -->
                    <div class="tab-content active" id="tab-zonas">
                        <div class="zonas-grid" id="zonasGrid">
                            <div class="loading">Cargando zonas...</div>
                        </div>
                    </div>
                    
                    <!-- Tab Eventos -->
                    <div class="tab-content" id="tab-eventos">
                        <div class="eventos-list" id="eventosList">
                            <div class="loading">Cargando eventos...</div>
                        </div>
                    </div>
                    
                    <!-- Tab Dispositivos -->
                    <div class="tab-content" id="tab-dispositivos">
                        <div class="dispositivos-list" id="dispositivosList">
                            <div class="loading">Cargando dispositivos...</div>
                        </div>
                    </div>
                </div>

                <!-- Progreso -->
                <div id="progressContainer" style="display: none;">
                    <div class="progress-info">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span id="progressMessage">Procesando...</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/components/autenticador.js"></script>
    <script type="module" src="/components/cargadorTemas.js"></script>
    <script src="/components/navbarAdministrador.js"></script>
    <script src="/components/footerAdministrador.js"></script>
    <script type="module" src="/components/particulas.js"></script>
    <script type="module" src="gestionarPanel.js"></script>
    <script src="/components/protector-master.js"> </script>
</body>
</html>
