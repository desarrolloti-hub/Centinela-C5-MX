<body>
    <canvas id="particle-canvas"></canvas>

    <div class="page-header">
        <h1>
            <i class="fas fa-tachometer-alt"></i> Mis Paneles
        </h1>
        <div class="header-description">
            Selecciona un panel para gestionarlo
        </div>
    </div>

    <div class="edit-main-container">
        <div class="edit-wrapper" style="max-width: 900px;">
            <div class="edit-right-panel">
                <header class="edit-header">
                    <h1 class="edit-main-title">PANELES VINCULADOS</h1>
                    <p class="edit-sub-title">
                        Cuenta: <span id="cuentaEmail">-</span> | App ID: <span id="cuentaAppId">-</span>
                    </p>
                </header>

                <!-- Información de la cuenta -->
                <div class="info-card">
                    <div class="info-header">
                        <i class="fas fa-network-wired"></i>
                        <span>Cuenta de Monitoreo</span>
                    </div>
                    <div class="info-content">
                        <div class="info-row">
                            <span class="info-label">Email:</span>
                            <span class="info-value" id="cuentaEmailInfo">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">App ID:</span>
                            <code class="info-value" id="cuentaAppIdInfo">-</code>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Organización:</span>
                            <span class="info-value" id="cuentaOrganizacion">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Paneles vinculados:</span>
                            <span class="info-value" id="totalPaneles">0</span>
                        </div>
                    </div>
                </div>

                <!-- Lista de paneles -->
                <div class="paneles-section">
                    <div class="section-header">
                        <h3><i class="fas fa-microchip"></i> Paneles disponibles</h3>
                        <button class="btn-refresh" id="btnRefresh">
                            <i class="fas fa-sync-alt"></i> Actualizar
                        </button>
                    </div>

                    <div class="paneles-grid" id="panelesGrid">
                        <div class="loading-paneles">
                            <i class="fas fa-spinner fa-spin"></i>
                            <span>Cargando paneles...</span>
                        </div>
                    </div>
                </div>

                <!-- Botón para vincular nuevo panel -->
                <div class="action-section">
                    <button class="action-btn save-btn" id="btnVincularNuevo">
                        <i class="fas fa-plus-circle"></i> VINCULAR NUEVO PANEL
                    </button>
                </div>

                <div id="progressContainer" style="display: none;">
                    <div class="progress-info">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span id="progressMessage">Procesando...</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                    </div>
                </div>

                <footer class="back-btn-container">
                    <a href="../loginMonitoreo/loginMonitoreo.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i> VOLVER A GESTIÓN
                    </a>
                </footer>
            </div>
        </div>
    </div>

    <script type="module" src="/components/cargadorTemas.js"></script>

    <script src="/components/footerAdministrador.js"></script>
