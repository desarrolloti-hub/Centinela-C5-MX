<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Centinela</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="/components/personalization/personalization.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="/assets/images/logo.png" type="image/png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="panelControl.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <meta name="description" content="Centinela-MX es un sistema inteligente de seguridad">
    <meta name="author" content="Centinela-MX">
    <link rel="canonical" href="https://centinela-mx.web.app/">
</head>

<body>
    <canvas id="particle-canvas"></canvas>

    <main class="right-layout">
        <!-- SECCIÓN 1: KPIS (SE GENERAN DINÁMICAMENTE) -->
        <div class="kpi-section">
            <h2><i class="fa-solid fa-chart-line"></i> PANEL DE CONTROL</h2>
            <div class="kpi-row-6" id="kpi-container">
                <!-- Las tarjetas KPI se generan dinámicamente según permisos -->
            </div>
        </div>

        <!-- SECCIÓN 2: ACCESO RÁPIDO -->
        <section class="center-row">
            <div class="side full-width">
                <div class="section-container">
                    <div class="section-header">
                        <h2 class="section-title"><i class="fa-solid fa-bolt"></i> ACCESO RÁPIDO</h2>
                        <p class="section-subtitle">Módulos principales según tu plan</p>
                    </div>

                    <div class="cards-grid-2" id="acceso-rapido-container">
                        <!-- Las tarjetas de acceso rápido se generan dinámicamente según permisos -->
                    </div>
                </div>
            </div>
        </section>

        <!-- SECCIÓN 3: MÓDULOS DE ACCESO (3 COLUMNAS) -->
        <section class="center-row">
            <div class="side full-width">
                <div class="section-container">
                    <div class="section-header">
                        <h2 class="section-title"><i class="fa-solid fa-cubes"></i> MÓDULOS DE ACCESO</h2>
                        <p class="section-subtitle">Gestión administrativa según tus permisos</p>
                    </div>

                    <div class="modulos-grid" id="modulos-container">
                        <!-- Los módulos se generan dinámicamente según permisos -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- COMPONENTES -->
    <script type="module" src="/components/autenticador.js"></script>
    <script type="module" src="/components/cargadorTemas.js"></script>
    <script type="module" src="/components/particulas.js"></script>
    <script src="/components/navbarAdministrador.js"></script>
    <script src="/components/footerColaborador.js"></script>
    <script type="module" src="panelControl.js"></script>

    <!-- Protector de pagina -->

</body>

</html>
